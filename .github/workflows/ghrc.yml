name: Docker Hub Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  quality_and_publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]
        pnpm-version: [10.x]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ matrix.pnpm-version }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --prefer-offline --frozen-lockfile

      - name: Linting TypeScript
        run: pnpm lint:ts

      - name: Linting SCSS
        run: pnpm lint:scss

      - name: Run tests
        run: pnpm test:run

      - name: Create .env for Docker build
        run: |
          touch .env
          echo "VITE_API_DOMAIN=${{ vars.VITE_API_DOMAIN }}" >> .env
          echo "VITE_LLM_DOMAIN=${{ vars.VITE_LLM_DOMAIN }}" >> .env
          echo "VITE_PARSER_DOMAIN=${{ vars.VITE_PARSER_DOMAIN }}" >> .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/philosopher-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/philosopher-frontend:${{ github.sha }}
